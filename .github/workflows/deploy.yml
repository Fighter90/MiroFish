name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/MiroFish
            git fetch origin main
            git reset --hard origin/main

            # Восстановить локальные настройки
            sed -i 's|image: ghcr.io/666ghj/mirofish:latest|image: mirofish-ru:latest|' docker-compose.yml

            # Очистка Docker-кеша для освобождения места
            docker system prune -af --volumes 2>/dev/null || true
            docker builder prune -af 2>/dev/null || true

            # Пересобрать без кеша и перезапустить
            docker build --no-cache -t mirofish-ru:latest .
            docker compose down
            docker compose up -d
            echo "Deploy completed at $(date)"
