name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          ZEP_API_KEY: ${{ secrets.ZEP_API_KEY }}
          FLASK_SECRET_KEY: ${{ secrets.FLASK_SECRET_KEY }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          envs: LLM_API_KEY,ZEP_API_KEY,FLASK_SECRET_KEY
          script: |
            cd /root

            # Остановить контейнеры до удаления кода
            cd /root/MiroFish 2>/dev/null && docker compose down --remove-orphans || true
            docker rm -f $(docker ps -aq) 2>/dev/null || true
            docker rmi mirofish-ru:latest 2>/dev/null || true
            docker system prune -af 2>/dev/null || true
            docker builder prune -af 2>/dev/null || true

            # Скачать свежий код тарболлом
            cd /root
            rm -rf MiroFish MiroFish-main
            curl -sL https://github.com/Fighter90/MiroFish/archive/refs/heads/main.tar.gz | tar xz
            mv MiroFish-main MiroFish
            cd /root/MiroFish

            # Создать .env из секретов
            cat > .env <<-ENVEOF
            FLASK_DEBUG=false
            SECRET_KEY=${FLASK_SECRET_KEY}
            LLM_API_KEY=${LLM_API_KEY}
            LLM_BASE_URL=https://openrouter.ai/api/v1
            LLM_MODEL_NAME=qwen/qwen3.5-122b-a10b
            ZEP_API_KEY=${ZEP_API_KEY}
            LLM_BOOST_API_KEY=${LLM_API_KEY}
            LLM_BOOST_BASE_URL=https://openrouter.ai/api/v1
            LLM_BOOST_MODEL_NAME=qwen/qwen3.5-27b
            ENVEOF
            chmod 600 .env

            # Локальные настройки docker-compose
            sed -i 's|image: ghcr.io/666ghj/mirofish:latest|image: mirofish-ru:latest|' docker-compose.yml

            # Uploads-каталог вне репо — переживает `rm -rf MiroFish` на следующих деплоях.
            mkdir -p /var/lib/mirofish/uploads
            chmod 700 /var/lib/mirofish/uploads
            export UPLOADS_VOLUME=/var/lib/mirofish/uploads

            # Пересобрать без кеша
            docker build --no-cache -t mirofish-ru:latest .

            # Запустить
            docker compose up -d --force-recreate
            echo "Deploy completed at $(date)"
