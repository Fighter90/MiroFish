name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          script: |
            # Скачать свежий код тарболлом (обход проблем с git credentials)
            cd /root
            rm -rf MiroFish
            curl -sL https://github.com/Fighter90/MiroFish/archive/refs/heads/main.tar.gz | tar xz
            mv MiroFish-main MiroFish
            cd /root/MiroFish

            # Восстановить локальные настройки
            sed -i 's|image: ghcr.io/666ghj/mirofish:latest|image: mirofish-ru:latest|' docker-compose.yml

            # Полная остановка и очистка
            docker compose down --remove-orphans || true
            docker rm -f $(docker ps -aq) 2>/dev/null || true
            docker rmi mirofish-ru:latest 2>/dev/null || true
            docker system prune -af 2>/dev/null || true
            docker builder prune -af 2>/dev/null || true

            # Пересобрать без кеша
            docker build --no-cache -t mirofish-ru:latest .

            # Запустить
            docker compose up -d --force-recreate
            echo "Deploy completed at $(date)"
