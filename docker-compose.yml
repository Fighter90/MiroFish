services:
  mirofish:
    image: ghcr.io/666ghj/mirofish:latest
    # Зеркало для ускоренного скачивания (замените адрес выше при медленной загрузке)
    # image: ghcr.nju.edu.cn/666ghj/mirofish:latest
    container_name: mirofish
    env_file:
      - .env
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:5001:5001"
    restart: unless-stopped
    volumes:
      # На проде указываем абсолютный путь через env: UPLOADS_VOLUME=/var/lib/mirofish/uploads.
      # deploy.yml делает `rm -rf MiroFish` при каждом пуше — если держать volume внутри
      # репо, данные симуляций (state.json, профили, логи) будут стираться.
      - ${UPLOADS_VOLUME:-./backend/uploads}:/app/backend/uploads
