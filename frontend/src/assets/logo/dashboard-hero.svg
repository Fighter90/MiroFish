<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EEF4FB"/>
      <stop offset="100%" stop-color="#E8F0FE"/>
    </linearGradient>
    <linearGradient id="blue1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="teal1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="line1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="card-shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1E3A5F" flood-opacity="0.08"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="url(#bg)"/>

  <!-- Card 1: Line Chart (large) -->
  <g filter="url(#card-shadow)">
    <rect x="24" y="24" width="340" height="200" rx="12" fill="white" fill-opacity="0.85"/>
    <!-- Tab indicators -->
    <rect x="40" y="36" width="48" height="6" rx="3" fill="#2563EB"/>
    <rect x="96" y="36" width="48" height="6" rx="3" fill="#06B6D4"/>
    <rect x="152" y="36" width="48" height="6" rx="3" fill="#E2E8F0"/>
    <!-- Grid lines -->
    <line x1="40" y1="80" x2="348" y2="80" stroke="#F1F5F9" stroke-width="1"/>
    <line x1="40" y1="110" x2="348" y2="110" stroke="#F1F5F9" stroke-width="1"/>
    <line x1="40" y1="140" x2="348" y2="140" stroke="#F1F5F9" stroke-width="1"/>
    <line x1="40" y1="170" x2="348" y2="170" stroke="#F1F5F9" stroke-width="1"/>
    <!-- Area fill -->
    <path d="M40 180 L40 150 C80 140, 100 120, 130 130 C160 140, 180 100, 210 110 C240 120, 260 90, 290 80 C310 72, 330 85, 348 75 L348 180 Z" fill="#2563EB" fill-opacity="0.06"/>
    <path d="M40 180 L40 160 C80 155, 100 140, 130 148 C160 155, 180 125, 210 135 C240 145, 260 115, 290 105 C310 98, 330 110, 348 100 L348 180 Z" fill="#06B6D4" fill-opacity="0.06"/>
    <!-- Line 1 (blue) -->
    <path d="M40 150 C80 140, 100 120, 130 130 C160 140, 180 100, 210 110 C240 120, 260 90, 290 80 C310 72, 330 85, 348 75" stroke="#2563EB" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Line 2 (teal) -->
    <path d="M40 160 C80 155, 100 140, 130 148 C160 155, 180 125, 210 135 C240 145, 260 115, 290 105 C310 98, 330 110, 348 100" stroke="#06B6D4" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Dots -->
    <circle cx="130" cy="130" r="3.5" fill="#2563EB" filter="url(#glow)"/>
    <circle cx="210" cy="110" r="3.5" fill="#2563EB" filter="url(#glow)"/>
    <circle cx="290" cy="80" r="3.5" fill="#2563EB" filter="url(#glow)"/>
    <circle cx="130" cy="148" r="3.5" fill="#06B6D4" filter="url(#glow)"/>
    <circle cx="210" cy="135" r="3.5" fill="#06B6D4" filter="url(#glow)"/>
    <circle cx="290" cy="105" r="3.5" fill="#06B6D4" filter="url(#glow)"/>
    <!-- Tooltip -->
    <rect x="260" y="50" width="70" height="28" rx="6" fill="#1E293B"/>
    <text x="295" y="68" text-anchor="middle" fill="white" font-size="11" font-family="system-ui" font-weight="600">+24.3%</text>
  </g>

  <!-- Card 2: Donut Chart -->
  <g filter="url(#card-shadow)">
    <rect x="380" y="24" width="190" height="200" rx="12" fill="white" fill-opacity="0.85"/>
    <g transform="translate(475, 120)">
      <!-- Donut segments -->
      <circle r="55" fill="none" stroke="#E2E8F0" stroke-width="20"/>
      <circle r="55" fill="none" stroke="#1D4ED8" stroke-width="20" stroke-dasharray="138 207" stroke-dashoffset="0" transform="rotate(-90)"/>
      <circle r="55" fill="none" stroke="#2563EB" stroke-width="20" stroke-dasharray="69 276" stroke-dashoffset="-138" transform="rotate(-90)"/>
      <circle r="55" fill="none" stroke="#06B6D4" stroke-width="20" stroke-dasharray="52 293" stroke-dashoffset="-207" transform="rotate(-90)"/>
      <circle r="55" fill="none" stroke="#67E8F9" stroke-width="20" stroke-dasharray="86 259" stroke-dashoffset="-259" transform="rotate(-90)"/>
      <!-- Center label -->
      <text x="0" y="-4" text-anchor="middle" fill="#1E293B" font-size="18" font-weight="700" font-family="system-ui">72%</text>
      <text x="0" y="12" text-anchor="middle" fill="#94A3B8" font-size="9" font-family="system-ui">ACCURACY</text>
    </g>
    <!-- Legend dots -->
    <circle cx="405" cy="185" r="4" fill="#1D4ED8"/>
    <circle cx="435" cy="185" r="4" fill="#2563EB"/>
    <circle cx="465" cy="185" r="4" fill="#06B6D4"/>
    <circle cx="495" cy="185" r="4" fill="#67E8F9"/>
  </g>

  <!-- Card 3: Bar Chart -->
  <g filter="url(#card-shadow)">
    <rect x="586" y="24" width="190" height="200" rx="12" fill="white" fill-opacity="0.85"/>
    <!-- Bars -->
    <rect x="606" y="130" width="16" height="60" rx="2" fill="#DBEAFE"/>
    <rect x="606" y="105" width="16" height="85" rx="2" fill="#2563EB" fill-opacity="0.3"/>
    <rect x="630" y="110" width="16" height="80" rx="2" fill="#DBEAFE"/>
    <rect x="630" y="80" width="16" height="110" rx="2" fill="#2563EB" fill-opacity="0.4"/>
    <rect x="654" y="90" width="16" height="100" rx="2" fill="#DBEAFE"/>
    <rect x="654" y="65" width="16" height="125" rx="2" fill="#2563EB" fill-opacity="0.5"/>
    <rect x="678" y="75" width="16" height="115" rx="2" fill="#DBEAFE"/>
    <rect x="678" y="50" width="16" height="140" rx="2" fill="#2563EB" fill-opacity="0.6"/>
    <rect x="702" y="60" width="16" height="130" rx="2" fill="#06B6D4" fill-opacity="0.3"/>
    <rect x="702" y="45" width="16" height="145" rx="2" fill="#2563EB" fill-opacity="0.7"/>
    <rect x="726" y="55" width="16" height="135" rx="2" fill="#06B6D4" fill-opacity="0.4"/>
    <rect x="726" y="40" width="16" height="150" rx="2" fill="#2563EB" fill-opacity="0.85"/>
    <rect x="750" y="50" width="16" height="140" rx="2" fill="#06B6D4" fill-opacity="0.5"/>
    <rect x="750" y="38" width="16" height="152" rx="2" fill="#2563EB"/>
  </g>

  <!-- Card 4: Bar Chart (bottom left) -->
  <g filter="url(#card-shadow)">
    <rect x="24" y="240" width="200" height="230" rx="12" fill="white" fill-opacity="0.85"/>
    <!-- Vertical bars -->
    <rect x="44" y="340" width="14" height="40" rx="2" fill="#06B6D4" fill-opacity="0.4"/>
    <rect x="44" y="310" width="14" height="70" rx="2" fill="#2563EB" fill-opacity="0.5"/>
    <rect x="66" y="320" width="14" height="60" rx="2" fill="#06B6D4" fill-opacity="0.5"/>
    <rect x="66" y="290" width="14" height="90" rx="2" fill="#2563EB" fill-opacity="0.6"/>
    <rect x="88" y="300" width="14" height="80" rx="2" fill="#06B6D4" fill-opacity="0.6"/>
    <rect x="88" y="270" width="14" height="110" rx="2" fill="#2563EB" fill-opacity="0.7"/>
    <rect x="110" y="310" width="14" height="70" rx="2" fill="#06B6D4" fill-opacity="0.5"/>
    <rect x="110" y="285" width="14" height="95" rx="2" fill="#2563EB" fill-opacity="0.65"/>
    <rect x="132" y="290" width="14" height="90" rx="2" fill="#06B6D4" fill-opacity="0.7"/>
    <rect x="132" y="262" width="14" height="118" rx="2" fill="#2563EB" fill-opacity="0.8"/>
    <rect x="154" y="280" width="14" height="100" rx="2" fill="#06B6D4" fill-opacity="0.8"/>
    <rect x="154" y="260" width="14" height="120" rx="2" fill="#2563EB" fill-opacity="0.85"/>
    <rect x="176" y="275" width="14" height="105" rx="2" fill="#06B6D4" fill-opacity="0.9"/>
    <rect x="176" y="255" width="14" height="125" rx="2" fill="#2563EB" fill-opacity="0.9"/>
    <rect x="198" y="270" width="14" height="110" rx="2" fill="#06B6D4"/>
    <rect x="198" y="250" width="14" height="130" rx="2" fill="#2563EB"/>
  </g>

  <!-- Card 5: Radar Chart -->
  <g filter="url(#card-shadow)">
    <rect x="240" y="240" width="190" height="230" rx="12" fill="white" fill-opacity="0.85"/>
    <g transform="translate(335, 360)">
      <!-- Radar grid -->
      <polygon points="0,-55 48,-28 48,28 0,55 -48,28 -48,-28" fill="none" stroke="#E2E8F0" stroke-width="1"/>
      <polygon points="0,-37 32,-18 32,18 0,37 -32,18 -32,-18" fill="none" stroke="#E2E8F0" stroke-width="1"/>
      <polygon points="0,-18 16,-9 16,9 0,18 -16,9 -16,-9" fill="none" stroke="#E2E8F0" stroke-width="1"/>
      <!-- Radar shape -->
      <polygon points="0,-45 40,-20 35,25 -5,48 -42,15 -30,-25" fill="#06B6D4" fill-opacity="0.15" stroke="#06B6D4" stroke-width="2"/>
      <!-- Dots -->
      <circle cx="0" cy="-45" r="3" fill="#06B6D4"/>
      <circle cx="40" cy="-20" r="3" fill="#06B6D4"/>
      <circle cx="35" cy="25" r="3" fill="#06B6D4"/>
      <circle cx="-5" cy="48" r="3" fill="#06B6D4"/>
      <circle cx="-42" cy="15" r="3" fill="#06B6D4"/>
      <circle cx="-30" cy="-25" r="3" fill="#06B6D4"/>
    </g>
  </g>

  <!-- Card 6: Mini line charts -->
  <g filter="url(#card-shadow)">
    <rect x="446" y="240" width="160" height="108" rx="12" fill="white" fill-opacity="0.85"/>
    <!-- Mini line -->
    <path d="M466 300 C480 290, 495 310, 510 295 C525 280, 540 300, 555 285 C570 270, 580 280, 590 275" stroke="#2563EB" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Labels -->
    <rect x="466" y="256" width="60" height="5" rx="2.5" fill="#CBD5E1"/>
    <rect x="466" y="268" width="90" height="4" rx="2" fill="#E2E8F0"/>
  </g>

  <!-- Card 7: Sparkline -->
  <g filter="url(#card-shadow)">
    <rect x="446" y="362" width="160" height="108" rx="12" fill="white" fill-opacity="0.85"/>
    <path d="M466 420 C480 410, 490 430, 505 415 C520 400, 535 425, 550 408 C565 395, 575 415, 590 400" stroke="#06B6D4" stroke-width="2" fill="none" stroke-linecap="round"/>
    <rect x="466" y="378" width="55" height="5" rx="2.5" fill="#CBD5E1"/>
    <rect x="466" y="390" width="80" height="4" rx="2" fill="#E2E8F0"/>
  </g>

  <!-- Card 8: KPI Cards -->
  <g filter="url(#card-shadow)">
    <rect x="622" y="240" width="154" height="230" rx="12" fill="white" fill-opacity="0.85"/>
    <!-- KPI 1 -->
    <rect x="638" y="260" width="46" height="36" rx="6" fill="#DBEAFE"/>
    <text x="661" y="283" text-anchor="middle" fill="#2563EB" font-size="14" font-weight="700" font-family="system-ui">230</text>
    <!-- KPI 2 (highlighted) -->
    <rect x="692" y="260" width="46" height="36" rx="6" fill="#06B6D4"/>
    <text x="715" y="283" text-anchor="middle" fill="white" font-size="14" font-weight="700" font-family="system-ui">375</text>
    <!-- KPI 3 -->
    <rect x="746" y="260" width="20" height="36" rx="6" fill="#DBEAFE"/>
    <text x="756" y="283" text-anchor="middle" fill="#2563EB" font-size="11" font-weight="700" font-family="system-ui">87</text>
    <!-- Mini sparklines -->
    <path d="M645 320 C655 315, 665 325, 675 310" stroke="#2563EB" stroke-width="1.5" fill="none"/>
    <path d="M700 320 C710 325, 720 315, 730 310" stroke="#06B6D4" stroke-width="1.5" fill="none"/>
    <!-- Info cards -->
    <rect x="638" y="345" width="62" height="50" rx="6" fill="#1E40AF"/>
    <rect x="638" y="358" width="40" height="4" rx="2" fill="#60A5FA"/>
    <rect x="638" y="368" width="50" height="3" rx="1.5" fill="#3B82F6" fill-opacity="0.5"/>
    <rect x="638" y="376" width="30" height="3" rx="1.5" fill="#3B82F6" fill-opacity="0.3"/>

    <rect x="706" y="345" width="62" height="50" rx="6" fill="white" stroke="#E2E8F0"/>
    <rect x="716" y="358" width="40" height="4" rx="2" fill="#CBD5E1"/>
    <rect x="716" y="368" width="45" height="3" rx="1.5" fill="#E2E8F0"/>
    <rect x="716" y="376" width="28" height="3" rx="1.5" fill="#E2E8F0"/>

    <!-- Bottom mini chart -->
    <rect x="638" y="405" width="128" height="50" rx="6" fill="white" stroke="#E2E8F0"/>
    <path d="M650 440 C665 432, 680 445, 695 428 C710 420, 725 435, 740 425 C750 420, 755 430, 760 422" stroke="#2563EB" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Heatmap card (top right corner accent) -->
  <g filter="url(#card-shadow)" transform="translate(586, 24)">
  </g>
</svg>
